services:
  router:
    build: .
    environment:
      RUST_LOG: info
    command:
      - "--http-listen"
      - "0.0.0.0:3000"
    expose:
      - "3000"

  tester:
    image: alpine:3.20
    depends_on:
      - router
    entrypoint: ["/bin/sh", "-lc"]
    command: ["apk add --no-cache curl netcat-openbsd >/dev/null && sleep infinity"]
